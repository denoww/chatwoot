services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: chatwoot_password
      POSTGRES_DB: chatwoot_production
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwoot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chatwoot_web:
    image: chatwoot/chatwoot:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3009:3009"
    env_file: .env.dev
    command: bundle exec rails s -p 3009 -b 0.0.0.0
    networks:
      - default
      - chatwoot_default

  chatwoot_worker:
    image: chatwoot/chatwoot:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.dev
    command: bundle exec sidekiq -C config/sidekiq.yml
    networks:
      - default
      - chatwoot_default

volumes:
  postgres_data:
  redis_data:

networks:
  chatwoot_default:
    name: chatwoot_default
