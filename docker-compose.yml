services:
  chatwoot_web:
    image: chatwoot/chatwoot:latest
    restart: unless-stopped
    ports:
      - "3009:3009"
    env_file: .env
    command: bundle exec rails s -p 3009 -b 0.0.0.0
  chatwoot_worker:
    image: chatwoot/chatwoot:latest
    restart: unless-stopped
    env_file: .env
    command: bundle exec sidekiq -C config/sidekiq.yml
